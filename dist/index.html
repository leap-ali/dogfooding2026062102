<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人博客</title>
  <script type="module" crossorigin src="/assets/index-BjLKzhGO.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BkfMPJRy.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>个人博客</h1>
      <p class="subtitle">纯前端 TypeScript 博客系统</p>
    </header>

    <section class="create-section">
      <h2>发布新博客</h2>
      <div class="form-row">
        <div class="form-group form-group-half">
          <label for="authorInput">作者</label>
          <input type="text" id="authorInput" placeholder="请输入作者名称" maxlength="50">
        </div>
        <div class="form-group form-group-half">
          <label for="titleInput">文章标题</label>
          <input type="text" id="titleInput" placeholder="请输入文章标题" maxlength="100">
        </div>
      </div>
      <div class="form-group">
        <label for="contentInput">文章正文</label>
        <textarea id="contentInput" placeholder="请输入文章内容" rows="6"></textarea>
      </div>
      <button id="publishBtn" class="btn btn-primary">发布文章</button>
    </section>

    <section class="list-section">
      <h2>博客列表</h2>
      <div id="blogList" class="blog-list"></div>
      <div id="emptyTip" class="empty-tip">暂无博客文章，快来发布第一篇吧！</div>
    </section>
  </div>

  <div id="viewModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="viewTitle"></h3>
        <span class="close-btn" data-modal="viewModal">&times;</span>
      </div>
      <div class="modal-body">
        <p class="modal-meta">
          <span id="viewAuthor" class="modal-author"></span>
          <span id="viewTime" class="modal-time"></span>
        </p>
        <div id="viewContent" class="modal-content-text"></div>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>编辑文章</h3>
        <span class="close-btn" data-modal="editModal">&times;</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="editAuthorInput">作者</label>
          <input type="text" id="editAuthorInput" maxlength="50">
        </div>
        <div class="form-group">
          <label for="editTitleInput">文章标题</label>
          <input type="text" id="editTitleInput" maxlength="100">
        </div>
        <div class="form-group">
          <label for="editContentInput">文章正文</label>
          <textarea id="editContentInput" rows="8"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-modal="editModal">取消</button>
        <button id="saveEditBtn" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

</body>
</html>
